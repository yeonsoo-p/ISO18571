minimum_pre_commit_version: "4.6.0"
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-check-fix
        name: ruff check --fix
        entry: uv run --extra test ruff check --fix .
        language: system
        pass_filenames: false
        files: ^((python/iso18571|reference|tests|tools)/.*\.pyi?|main\.py|pyproject\.toml)$

      - id: ruff-format
        name: ruff format
        entry: uv run --extra test ruff format .
        language: system
        pass_filenames: false
        files: ^((python/iso18571|reference|tests|tools)/.*\.pyi?|main\.py|pyproject\.toml)$

      - id: ruff-check
        name: ruff check
        entry: uv run --extra test ruff check .
        language: system
        pass_filenames: false
        files: ^((python/iso18571|reference|tests|tools)/.*\.pyi?|main\.py|pyproject\.toml)$

      - id: ruff-format-check
        name: ruff format --check
        entry: uv run --extra test ruff format --check .
        language: system
        pass_filenames: false
        files: ^((python/iso18571|reference|tests|tools)/.*\.pyi?|main\.py|pyproject\.toml)$

      - id: mypy
        name: mypy
        entry: uv run --extra test mypy python/iso18571 reference tests
        language: system
        pass_filenames: false
        files: ^((python/iso18571|reference|tests)/.*\.pyi?|pyproject\.toml)$

      - id: clang-format
        name: clang-format
        entry: uv run --extra test clang-format -i
        language: system
        files: ^(src/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx)|python/iso18571/_core\.cpp)$

      - id: staged-whitespace
        name: git diff --check --cached
        entry: git diff --check --cached
        language: system
        pass_filenames: false
        always_run: true

      - id: pre-commit-validate-config
        name: pre-commit validate-config
        entry: uv run --extra test pre-commit validate-config
        language: system
        pass_filenames: false
        files: ^\.pre-commit-config\.yaml$
