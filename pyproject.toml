[build-system]
requires = ["scikit-build-core", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "euroncap"
version = "1.0.0"
description = "Euro NCAP and ISO/TS 18571 validation tooling"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["numpy"]

[project.optional-dependencies]
build = ["build", "cibuildwheel"]
test = ["dtw-python", "dtwalign", "librosa", "pytest", "ruff", "scipy"]

[tool.scikit-build]
build-dir = "build/{wheel_tag}"
cmake.version = ">=3.21"
wheel.packages = []

[tool.cibuildwheel]
build = "cp313-*"
skip = "*-musllinux_*"
test-sources = ["tools/iso18571/wheel_smoke.py"]
test-command = "python tools/iso18571/wheel_smoke.py"

[tool.cibuildwheel.linux]
archs = ["x86_64"]

[tool.cibuildwheel.windows]
archs = ["AMD64"]
